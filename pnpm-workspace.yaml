# Engram workspace. The hero (memory) + shared infra live here as clean,
# independently-testable packages. Agent runtimes are deliberately NOT members:
# they live in their own repos and reach the memory service over MCP (a stdio
# subprocess), not as a code dependency — which is what keeps Engram a drop-in
# memory layer for any agent.
packages:
  - "packages/*"

# Supply-chain: new package versions must age before pnpm resolves them.
minimumReleaseAge: 4320

onlyBuiltDependencies:
  - esbuild
